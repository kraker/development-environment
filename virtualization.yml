---

- name: Virtualization Host
  hosts: localhost
  become: true
  vars:
    # Resolved on the controller side, before `become` switches us to root,
    # so this captures the real invoking user (github-runner in CI, the
    # shell user locally).
    invoking_user: "{{ lookup('env', 'USER') }}"
  tasks:
    - name: Install "Virtualization Host" group
      ansible.builtin.dnf:
        name: '@Virtualization Host'
        state: present

    # Needs CRB which is enabled in epel.yml. Required to build any
    # tool that links against libvirt (e.g. vagrant-libvirt).
    - name: Install libvirt-devel
      ansible.builtin.dnf:
        name: libvirt-devel
        state: present

    - name: Add user to libvirt group
      ansible.builtin.user:
        name: "{{ invoking_user }}"
        groups: libvirt
        append: true
